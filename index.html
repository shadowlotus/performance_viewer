<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Performa Chatbot - Nuansa Bali</title>
    <!-- Google Fonts: Playfair Display for headers, Montserrat for body -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for valid icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bali-gold: #d4af37;
            --bali-red: #8b0000;
            --bali-dark: #1a1a1a;
            --bali-cream: #fdf5e6;
            --bali-stone: #4a4a4a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bali-cream);
            color: var(--bali-dark);
            margin: 0;
            padding: 20px;
            /* Pattern Batik halus untuk latar belakang */
            background-image: url('https://www.transparenttextures.com/patterns/batik-floral.png');
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--bali-gold);
            position: relative;
        }

        /* Ornamen Sudut Khas Bali */
        .container::before, .container::after {
            content: '✿';
            position: absolute;
            color: var(--bali-gold);
            font-size: 2rem;
        }
        .container::before { top: 10px; left: 10px; }
        .container::after { bottom: 10px; right: 10px; }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 3px double var(--bali-gold);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--bali-red);
            font-size: 2.8rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .bali-subtitle {
            font-style: italic;
            color: var(--bali-stone);
            letter-spacing: 1px;
        }

        .bali-icon {
            font-size: 2.5rem;
            color: var(--bali-gold);
            margin: 0 20px;
            vertical-align: middle;
        }

        /* Table Styling */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background-color: var(--bali-red);
            color: white;
        }

        th {
            padding: 20px;
            text-align: left;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-bottom: 4px solid var(--bali-gold);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        tr:nth-child(even) {
            background-color: #fffaf0;
        }

        tr:hover {
            background-color: #f7f0e1;
            transition: 0.3s ease;
        }

        /* Time Badge */
        .badge-time {
            background: var(--bali-dark);
            color: var(--bali-gold);
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-family: monospace;
            border: 1px solid var(--bali-gold);
        }

        /* Chat Styling */
        .chat-text {
            max-width: 400px;
            display: block;
        }

        .user-tag { color: #2c3e50; font-weight: 600; }
        .bot-tag { color: var(--bali-red); font-weight: 600; }

        /* Loading & Error */
        #loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--bali-stone);
        }

        #error-msg {
            display: none;
            text-align: center;
            color: #721c24;
            background: #f8d7da;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--bali-stone);
            font-size: 0.85rem;
            border-top: 1px solid var(--bali-gold);
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <i class="fa-solid fa-om bali-icon"></i>
        <h1>Data Performa Chatbot</h1>
        <div class="bali-subtitle">Monitoring Warisan Budaya Nusantara</div>
    </header>

    <div id="error-msg">
        <i class="fas fa-exclamation-circle"></i> Terjadi kesalahan saat mengambil data.
    </div>

    <div id="loading">
        <i class="fas fa-dharmachakra fa-spin" style="color: var(--bali-gold); font-size: 2rem;"></i>
        <p>Memuat data dari pustaka digital...</p>
    </div>

    <div class="table-wrapper">
        <table id="performanceTable" style="display: none;">
            <thead>
                <tr>
                    <th><i class="fas fa-hashtag"></i> Nomor</th>
                    <th><i class="fas fa-stopwatch"></i> Kecepatan</th>
                    <th><i class="fas fa-comment-user"></i> Pesan User</th>
                    <th><i class="fas fa-robot"></i> Respon Bot</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data akan diisi oleh JavaScript -->
            </tbody>
        </table>
    </div>

    <footer>
        <p>&copy; Warbuda - 2026 <i class="fas fa-flower"></i></p>
    </footer>
</div>

<script>
    const API_URL = 'https://n8n.arcomteknologi.co.id/webhook/36a11683-faa5-487b-8bc8-5dbd61ed97e0';

    async function getChatData() {
        const table = document.getElementById('performanceTable');
        const tableBody = document.getElementById('tableBody');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('error-msg');

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            
            tableBody.innerHTML = ''; // Reset tabel

            data.forEach(item => {
                const row = document.createElement('tr');
                
                // Format waktu menjadi X.Xs
                const timeFormatted = `${parseFloat(item.time).toFixed(1)}s`;

                row.innerHTML = `
                    <td><strong>${item.id}</strong></td>
                    <td><span class="badge-time">${timeFormatted}</span></td>
                    <td><span class="chat-text"><small class="user-tag">USER:</small><br>${item.user_chat}</span></td>
                    <td><span class="chat-text"><small class="bot-tag">BOT:</small><br>${item.chatbot_respon}</span></td>
                `;
                tableBody.appendChild(row);
            });

            loading.style.display = 'none';
            table.style.display = 'table';

        } catch (error) {
            console.error('Error:', error);
            loading.style.display = 'none';
            errorMsg.style.display = 'block';
            errorMsg.innerHTML += `<br><small>${error.message}. Pastikan CORS Webhook sudah aktif.</small>`;
        }
    }

    // Eksekusi fungsi saat halaman selesai dimuat
    document.addEventListener('DOMContentLoaded', getChatData);
</script>

</body>
</html>
